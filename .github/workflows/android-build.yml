name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Removed local.properties step entirely (not required in CI)

      - name: Grant gradlew permission
        run: chmod +x ./gradlew || true

      - name: Build APK
        run: ./gradlew assembleDebug
